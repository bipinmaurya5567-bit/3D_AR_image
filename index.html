<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tennis Ball AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; }

      #loading-screen {
        position: fixed;
        width: 100%; height: 100%;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        color: white;
        font-family: Arial, sans-serif;
        transition: opacity 1s ease;
      }

      .spinner {
        width: 60px; height: 60px;
        border: 6px solid #333;
        border-top: 6px solid #adff2f;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      #loading-screen p {
        font-size: 18px;
        color: #adff2f;
        letter-spacing: 1px;
      }

      #hint {
        display: none;
        position: fixed;
        bottom: 30px;
        width: 100%;
        text-align: center;
        z-index: 999;
        font-family: Arial, sans-serif;
      }

      #hint span {
        background: rgba(0,0,0,0.6);
        color: #adff2f;
        padding: 10px 20px;
        border-radius: 30px;
        font-size: 15px;
      }
    </style>
  </head>
  <body>

    <!-- Loading Screen -->
    <div id="loading-screen">
      <div class="spinner"></div>
      <p>Loading AR...</p>
    </div>

    <!-- Hint -->
    <div id="hint">
      <span>🎾 Point camera at the Tennis Ball image</span>
    </div>

    <!-- AR Scene -->
    <a-scene
      mindar-image="imageTargetSrc: ./targets-boll.mind; autoStart: true;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <a-asset-item id="tennis-ball" src="./Tennis ball.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model
          src="#tennis-ball"
          position="0 0 0.1"
          scale="20 20 20"
          rotation="0 0 0"
          animation="property: rotation; to: 0 360 0; loop: true; dur: 3000; easing: linear"
        ></a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      document.querySelector('a-scene').addEventListener('loaded', () => {
        setTimeout(() => {
          const ls = document.getElementById('loading-screen');
          ls.style.opacity = '0';
          setTimeout(() => {
            ls.style.display = 'none';
            document.getElementById('hint').style.display = 'block';
          }, 1000);
        }, 3000);
      });
    </script>

  </body>
</html>
